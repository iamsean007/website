name: Deploy Masala Lab

on:
  push:
    branches: [main]
    paths:
      - 'masala-lab/**'
      - '.github/workflows/deploy-masala-lab.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: masala-lab-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: masala-lab/package-lock.json

      - name: Install and build
        working-directory: masala-lab
        env:
          GITHUB_PAGES: 'true'
        run: |
          npm ci
          npm run build
          cp dist/index.html dist/404.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: masala-lab/dist
          publish_branch: gh-pages
          force_orphan: true
          commit_message: 'Deploy Masala Lab prototype'
