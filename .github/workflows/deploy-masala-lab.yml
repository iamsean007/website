name: Deploy Masala Lab

on:
  push:
    branches: [main, cursor/masala-lab-concept-8e5d]
    paths:
      - 'masala-lab/**'
      - '.github/workflows/deploy-masala-lab.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: masala-lab-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: masala-lab/package-lock.json

      - name: Install and build
        working-directory: masala-lab
        env:
          GITHUB_PAGES: 'true'
        run: |
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: masala-lab/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
